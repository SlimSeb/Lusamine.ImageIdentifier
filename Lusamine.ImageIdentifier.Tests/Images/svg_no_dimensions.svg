<svg xmlns="http://www.w3.org/2000/svg">
  <!-- No width, no height, no viewBox.
       SVG spec says intrinsic size is 300×150 (browser default),
       but most non-browser tools have no idea what to do. -->
  <rect x="10" y="10" width="100" height="50" fill="#d9534f"/>
  <text x="60" y="40" text-anchor="middle" fill="white" font-size="12">no dimensions</text>
</svg>
