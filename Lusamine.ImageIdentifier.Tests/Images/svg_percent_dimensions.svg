<svg xmlns="http://www.w3.org/2000/svg"
     width="100%" height="100%"
     viewBox="0 0 400 200">
  <!-- width/height are percentages: intrinsic pixel size is undefined without
       a containing block. A header parser cannot determine raster dimensions. -->
  <rect x="0" y="0" width="400" height="200" fill="#e8f4f8"/>
  <circle cx="200" cy="100" r="80" fill="#2c7bb6" opacity="0.7"/>
  <text x="200" y="105" text-anchor="middle" fill="white" font-size="18">100% × 100%</text>
</svg>
