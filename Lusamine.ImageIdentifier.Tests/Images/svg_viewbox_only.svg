<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <!-- No width or height attributes. Intrinsic size must be derived from viewBox.
       Many rasterizers default to 300x150 or fail entirely. -->
  <rect x="10" y="10" width="180" height="80" fill="#4a90d9"/>
  <text x="100" y="55" text-anchor="middle" fill="white" font-size="14">viewBox only</text>
</svg>
