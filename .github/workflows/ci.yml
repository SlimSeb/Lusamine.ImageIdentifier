name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lusamine.ImageIdentifier.Tests/Lusamine.ImageIdentifier.Tests.csproj

      - name: Build
        run: dotnet build Lusamine.ImageIdentifier.Tests/Lusamine.ImageIdentifier.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test Lusamine.ImageIdentifier.Tests/Lusamine.ImageIdentifier.Tests.csproj --configuration Release --no-build --verbosity normal

  pack:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack Lusamine.ImageIdentifier/Lusamine.ImageIdentifier.csproj --configuration Release --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nuget-package
          path: ./artifacts/*.*nupkg
